<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->
  <link rel="icon" type="image/svg+xml" href="/img/DBLOG.ico" />
  <!-- 页面描述，对SEO至关重要 -->
  <meta name="description" content="全网最好的技术博客站点——Kydon 的个人博客，专注于技术文章分享。" />

  <!-- 关键词 (虽然现代搜索引擎权重降低，但仍可提供参考) -->
  <meta name="keywords" content="技术, 博客, 个人, 分享, Kydon, qidong, 启东, DBLOG, 经世致用, 文理兼修" />

  <!-- 作者信息 -->
  <meta name="author" content="Kydon" />

  <!-- 控制搜索引擎爬虫的索引行为 -->
  <meta name="robots" content="index, follow" />

  <!--为社交媒体分享优化 (Open Graph) -->
  <meta property="og:title" content="DBLOG——全网最好的技术博客站点，专注于技术文章分享。" />
  <meta property="og:description" content="全网最好的技术博客站点——Kydon 的个人博客，专注于技术文章分享。" />
  <meta property="og:image" content="https://www.qidong.tech/img/DBLOG.png" />
  <meta property="og:url" content="https://www.qidong.tech" />
  <meta property="og:type" content="website" />

  <!-- 定义浏览器主题色，通常用于移动端浏览器地址栏着色 发发发 -->
  <meta name="theme-color" content="#fafafa" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>比帅大是看来过反</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
