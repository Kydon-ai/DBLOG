<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- 背景 -->
  <rect width="800" height="450" fill="#f5f5f5"/>
  
  <!-- 装饰性图形 -->
  <circle cx="600" cy="150" r="100" fill="#e6f7ff" opacity="0.5"/>
  <circle cx="200" cy="300" r="120" fill="#f6ffed" opacity="0.5"/>
  
  <!-- 文字 -->
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1890ff" text-anchor="middle">博客</text>
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="24" fill="#8c8c8c" text-anchor="middle">Blog Post</text>
</svg>